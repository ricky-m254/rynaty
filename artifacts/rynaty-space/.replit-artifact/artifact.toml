kind = "web"
previewPath = "/rynaty/"
title = "Rynaty Space Technologies"
version = "1.0.0"
id = "artifacts/rynaty-space"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rynaty/" ]
localPort = 22960

[services.development]
run = "pnpm --filter @workspace/rynaty-space run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rynaty-space", "run", "build" ]
publicDir = "artifacts/rynaty-space/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22960"
BASE_PATH = "/rynaty/"
