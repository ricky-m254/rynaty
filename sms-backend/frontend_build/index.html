  <head>

    <style>
      body { padding-bottom: 36px; }
      @media print {
        aside, nav, header nav, .no-print, button:not(.print-btn) { display: none !important; }
        body { background: white !important; color: black !important; }
        .print-area { display: block !important; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-D7ltaYVC.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D2uGumwC.css">
    <link rel="stylesheet" href="/assets/future-tech.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var HEALTH_URL = '/api/health/';
        var POLL_INTERVAL_OK = 30000;
        var POLL_INTERVAL_DOWN = 10000;
        var bannerId = 'sc-db-health-banner';
        var timer = null;

        function showBanner() {
          if (document.getElementById(bannerId)) return;
          var bar = document.createElement('div');
          bar.id = bannerId;
          bar.setAttribute('role', 'alert');
          bar.style.cssText = [
            'position:fixed','top:0','left:0','right:0','z-index:99999',
            'background:#b91c1c','color:#fff','text-align:center',
            'padding:10px 16px','font-size:14px','font-family:system-ui,sans-serif',
            'box-shadow:0 2px 8px rgba(0,0,0,0.3)','line-height:1.4'
          ].join(';');
          bar.innerHTML = [
            '<strong>Service Unavailable</strong>',
            ' \u2014 The database is temporarily unreachable.',
            ' Login and other features may not work until the service is restored.'
          ].join('');
          document.body.insertBefore(bar, document.body.firstChild);
          document.body.style.paddingTop = (parseInt(document.body.style.paddingTop || '0') + bar.offsetHeight) + 'px';
        }

        function hideBanner() {
          var bar = document.getElementById(bannerId);
          if (!bar) return;
          var h = bar.offsetHeight;
          bar.parentNode.removeChild(bar);
          var cur = parseInt(document.body.style.paddingTop || '0');
          document.body.style.paddingTop = Math.max(0, cur - h) + 'px';
        }

        function check() {
          clearTimeout(timer);
          fetch(HEALTH_URL, { cache: 'no-store' })
            .then(function(r) {
              if (r.ok) {
                hideBanner();
                timer = setTimeout(check, POLL_INTERVAL_OK);
              } else {
                showBanner();
                timer = setTimeout(check, POLL_INTERVAL_DOWN);
              }
            })
            .catch(function() {
              showBanner();
              timer = setTimeout(check, POLL_INTERVAL_DOWN);
            });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', check);
        } else {
          check();
        }
      })();
    </script>
    <script>
      (function() {
        var btn = document.createElement('button');
        btn.id = 'global-print-btn';
        btn.title = 'Print this page';
        btn.innerHTML = '&#128424;';
        btn.style.cssText = [
          'position:fixed','bottom:72px','right:18px','z-index:9998',
          'background:#10b981','color:white','border:none','border-radius:50%',
          'width:46px','height:46px','font-size:20px','cursor:pointer',
          'box-shadow:0 2px 12px rgba(0,0,0,0.25)','display:none',
          'align-items:center','justify-content:center','line-height:1'
        ].join(';');
        btn.onclick = function() { window.print(); };
        document.body.appendChild(btn);
        function check() {
          var p = window.location.pathname + window.location.hash;
          btn.style.display = (p.indexOf('/parent') !== -1 || p.indexOf('#/parent') !== -1) ? 'flex' : 'none';
        }
        check();
        window.addEventListener('popstate', check);
        window.addEventListener('hashchange', check);
        var _pushState = history.pushState;
        history.pushState = function() { _pushState.apply(this, arguments); setTimeout(check, 50); };
        var _replaceState = history.replaceState;
        history.replaceState = function() { _replaceState.apply(this, arguments); setTimeout(check, 50); };
      })();
    </script>
  </body>
</html>
